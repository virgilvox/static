# DigitalOcean App Platform spec for STATIC.
# Deployed as a static site, which is the cheapest option (no running instance,
# served from the CDN). No server runtime and no secrets.
#
# Create once:   doctl apps create --spec .do/app.yaml
# Update later:  doctl apps update <APP_ID> --spec .do/app.yaml
#
# The static.gdn domain is on DigitalOcean DNS, so the records and TLS
# certificate are provisioned automatically once this app is created.
name: static-gdn
region: nyc
static_sites:
  - name: web
    git:
      repo_clone_url: https://github.com/virgilvox/static.git
      branch: main
    build_command: npm ci && npm run build
    output_dir: dist
    index_document: index.html
    catchall_document: index.html
domains:
  - domain: static.gdn
    type: PRIMARY
